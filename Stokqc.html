}

/* ===== TABLE ===== */
.table-wrapper{

}

table{

    background:rgba(255,255,255,0.9);
    color:#222;
    border-radius:10px;

}

thead{

    color:white;
}

th,td{

    text-align:left;
}

tbody tr{
    transition:0.25s;
}

tbody tr:nth-child(even){
    background:#f5f0ff;
}

tbody tr:hover{
    background:#e6d9ff;
    transform:scale(1.01);
}

/* ===== BUTTON ===== */
.btn{
    display:inline-block;
    margin-top:20px;
    padding:12px 25px;
    background:#6a0dad;
    color:white;
    text-decoration:none;
    border-radius:10px;

    box-shadow:0 6px #4b0082;
}

.btn:hover{

/* ===== RESPONSIVE ===== */
@media(max-width:768px){
